<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音直播录制工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </div>
        <h1>抖音直播录制工具</h1>
      </div>
      <div class="header-right">
        <div id="login-status" class="login-status" title="点击登录抖音">
          <div class="login-status__avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="login-status__info">
            <span id="login-status__name" class="login-status__name">未登录</span>
            <span id="login-status__badge" class="login-status__badge login-status__badge--offline">未登录</span>
          </div>
        </div>
        <button id="btn-login" class="btn btn-ghost" title="登录抖音账号">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          登录抖音
        </button>
        <button id="btn-settings" class="btn btn-ghost" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </button>
        <button id="btn-logs" class="btn btn-ghost" title="查看日志">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </button>
      </div>
    </header>

    <!-- 添加直播间区域 -->
    <section class="add-section">
      <div class="add-input-group">
        <div class="input-row">
          <div class="input-item">
            <label class="input-label">房间号</label>
            <input
              type="text"
              id="input-room-id"
              class="input-field"
              placeholder="如：123456"
            />
          </div>
          <div class="input-item">
            <label class="input-label">主播主页链接</label>
            <input
              type="text"
              id="input-profile-url"
              class="input-field"
              placeholder="https://v.douyin.com/xxxxx/"
            />
          </div>
          <div class="input-item">
            <label class="input-label">直播间链接</label>
            <input
              type="text"
              id="input-live-url"
              class="input-field"
              placeholder="https://live.douyin.com/xxxxx"
            />
          </div>
          <button id="btn-add" class="btn btn-primary btn-add">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            添加
          </button>
        </div>
      </div>
      <div id="add-error" class="error-msg" style="display:none;"></div>
    </section>

    <!-- 直播间列表 -->
    <section class="streams-section">
      <div class="section-header">
        <h2>直播间列表</h2>
        <span id="stream-count" class="badge">0 个直播间</span>
      </div>

      <div id="streams-list" class="streams-list">
        <!-- 空状态 -->
        <div id="empty-state" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
          <p>暂无直播间，请粘贴抖音直播链接添加</p>
        </div>
      </div>
    </section>

    <!-- 设置面板 -->
    <section id="settings-panel" class="settings-panel" style="display:none;">
      <div class="settings-header">
        <h2>设置</h2>
        <button id="btn-close-settings" class="btn btn-ghost btn-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <label>录制文件保存位置</label>
          <div class="setting-row">
            <input type="text" id="output-folder" class="input-text" placeholder="请选择保存位置" readonly>
            <button id="btn-browse" class="btn btn-secondary btn-sm">浏览...</button>
          </div>
        </div>
        <div class="setting-item">
          <label>直播状态检测间隔（秒）</label>
          <input type="number" id="check-interval" class="input-text" min="10" max="300" value="30">
        </div>
        <div class="setting-item">
          <label>录制帧率（FPS）</label>
          <input type="number" id="fps" class="input-text" min="15" max="60" value="30">
        </div>
        <div class="setting-item">
          <label class="checkbox-label">
            <input type="checkbox" id="auto-start" checked>
            <span>检测到开播自动开始录制</span>
          </label>
        </div>
        <div class="setting-item">
          <label class="checkbox-label">
            <input type="checkbox" id="minimize-to-tray" checked>
            <span>关闭窗口时最小化到系统托盘</span>
          </label>
        </div>
        <div class="setting-item">
          <label class="checkbox-label">
            <input type="checkbox" id="launch-at-login">
            <span>开机自动启动</span>
          </label>
          <p class="setting-hint">启用后，程序将随 Windows 系统自动启动，持续监控直播间</p>
        </div>
        <div class="settings-actions">
          <button id="btn-save-settings" class="btn btn-primary">保存设置</button>
        </div>
      </div>
    </section>

    <!-- 日志查看器 -->
    <section id="log-panel" class="settings-panel" style="display:none;">
      <div class="settings-header">
        <h2>运行日志</h2>
        <div class="settings-header-actions">
          <button id="btn-refresh-logs" class="btn btn-ghost btn-sm" title="刷新">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
          <button id="btn-open-log-file" class="btn btn-ghost btn-sm" title="打开日志文件">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </button>
          <button id="btn-close-logs" class="btn btn-ghost btn-sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="settings-body">
        <div id="log-content" class="log-content">
          <p class="log-loading">加载中...</p>
        </div>
        <div class="settings-actions">
          <span id="log-file-path" class="log-file-path"></span>
        </div>
      </div>
    </section>

    <!-- 状态栏 -->
    <footer class="footer">
      <div class="footer-left">
        <span id="status-text">就绪</span>
      </div>
      <div class="footer-right">
        <span id="recording-count">录制中: 0</span>
      </div>
    </footer>
  </div>

  <!-- Toast 通知 -->
  <div id="toast-container" class="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
